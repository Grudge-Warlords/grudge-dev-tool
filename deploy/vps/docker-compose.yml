# Grudge Studio — Linux VPS Docker Stack
# Deploy: docker compose -f /opt/grudge/docker-compose.yml up -d
# Rollback: docker compose stop  (MySQL data persists in named volume)
# Requires: .env file alongside this compose (see .env.template)

services:
  # ──────── DATA LAYER ────────
  mysql:
    image: mysql:8.0
    container_name: grudge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: grudge
      MYSQL_USER: ${MYSQL_USER:-grudge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - grudge-net

  redis:
    image: redis:7-alpine
    container_name: grudge-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - grudge-net

  # ──────── APPLICATION SERVICES ────────
  grudge-id:
    image: ${DOCKER_REGISTRY:-ghcr.io/molochdagod}/grudge-id:${TAG:-latest}
    container_name: grudge-id
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-grudge}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: grudge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: grudge-studio
      CORS_ORIGINS: ${CORS_ORIGINS}
      # OAuth providers
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - grudge-net

  game-api:
    image: ${DOCKER_REGISTRY:-ghcr.io/molochdagod}/game-api:${TAG:-latest}
    container_name: grudge-game-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-grudge}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: grudge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # R2 / Object Storage (for server-side asset ops)
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-grudge-assets}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - grudge-net

  account-api:
    image: ${DOCKER_REGISTRY:-ghcr.io/molochdagod}/account-api:${TAG:-latest}
    container_name: grudge-account-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3005"
    environment:
      PORT: 3005
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-grudge}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: grudge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Crossmint (custodial wallets)
      CROSSMINT_API_KEY: ${CROSSMINT_API_KEY:-}
      CROSSMINT_PROJECT_ID: ${CROSSMINT_PROJECT_ID:-}
      # Discord OAuth
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - grudge-net

  launcher-api:
    image: ${DOCKER_REGISTRY:-ghcr.io/molochdagod}/launcher-api:${TAG:-latest}
    container_name: grudge-launcher-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3006:3006"
    environment:
      PORT: 3006
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-grudge}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: grudge
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - grudge-net

  ws-service:
    image: ${DOCKER_REGISTRY:-ghcr.io/molochdagod}/ws-service:${TAG:-latest}
    container_name: grudge-ws
    restart: unless-stopped
    ports:
      - "127.0.0.1:3007:3007"
    environment:
      PORT: 3007
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - grudge-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  grudge-net:
    driver: bridge
