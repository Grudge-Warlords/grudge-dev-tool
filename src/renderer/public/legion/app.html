<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ALE Legion Orb</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at 50% 40%, #1a2540 0%, #0a0e1a 70%); }
    .orb-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
    .orb {
      width: 160px; height: 160px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffe07a, #ffc62a 40%, #b8860b 100%);
      box-shadow: 0 0 60px rgba(255, 198, 42, 0.45), inset 0 0 30px rgba(255, 255, 255, 0.2);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(255, 198, 42, 0.45); }
      50% { transform: scale(1.04); box-shadow: 0 0 80px rgba(255, 198, 42, 0.65); }
    }
    .label { color: #ffc62a; font: 600 13px/1.4 system-ui, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
    .sub { color: #8a9bb8; font: 11px/1.4 system-ui, sans-serif; text-align: center; max-width: 220px; }
  </style>
</head>
<body>
  <div class="orb-wrap">
    <div class="orb" aria-hidden="true"></div>
    <div class="label">ALE Legion</div>
    <div class="sub">Brother Keeper online — chat in the panel →</div>
  </div>
</body>
</html>
